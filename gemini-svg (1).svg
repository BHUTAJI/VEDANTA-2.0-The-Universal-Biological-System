<svg width="1200" height="1500" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1500" fill="#f9f9f9"/>
  
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#4A90E2" stroke-width="2"/>
    <text x="0" y="140" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Fig 1A/B: Toroidal Hierarchy</text>
  </g>

  <g transform="translate(600, 200)">
    <polygon points="0,-80 70,40 -70,40" fill="none" stroke="#F5A623" stroke-width="3"/>
    <text x="0" y="140" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Fig 2: 3-6-9 Harmonic Code</text>
  </g>

  <g transform="translate(1000, 200)">
    <rect x="-80" y="-80" width="160" height="160" fill="none" stroke="#9013FE" stroke-width="2"/>
    <text x="0" y="140" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Fig 3: Tri-Guna State Space</text>
  </g>

  <g transform="translate(300, 600)">
    <circle cx="0" cy="0" r="30" fill="#FFD700"/>
    <circle cx="0" cy="0" r="80" fill="none" stroke="#7ED321" stroke-dasharray="4"/>
    <circle cx="0" cy="0" r="150" fill="none" stroke="#7ED321" stroke-dasharray="4"/>
    <text x="0" y="200" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Fig 4: Harmonic Boundary R_n</text>
  </g>

  <g transform="translate(800, 600)">
    <path d="M -50,-50 Q 0,-100 50,-50 T 50,50 T -50,50 T -50,-50" fill="none" stroke="#D0021B" stroke-width="3"/>
    <text x="0" y="140" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">Fig 5: Cosmic Respiration</text>
  </g>

  <text x="600" y="1450" font-family="Arial" font-size="18" text-anchor="middle" font-style="italic">
    VEDANTA 2.0: Unified Geometric Representation of Matter Transmutation
  </text>
</svg>
